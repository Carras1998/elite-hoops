<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FF6B00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Elite Hoops">
<link rel="manifest" id="manifest-link">
<title>ELITE HOOPS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--or:#FF6B00;--am:#FFB300;--dk:#0A0A0A;--su:#111;--cd:#161616;--bd:#222;--mu:#555;--li:#E8E8E0;--gn:#4a9d4a;--bl:#6b8fcf;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:var(--dk);color:var(--li);font-family:'DM Sans',sans-serif;padding-bottom:env(safe-area-inset-bottom,0px);}
body::after{content:'';display:block;height:66px;}
.top-nav{position:sticky;top:0;z-index:200;background:rgba(10,10,10,.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);}
.nav-row1{display:flex;align-items:center;justify-content:space-between;padding:10px 20px 0;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.12em;}
.logo span{color:var(--or);}
/* NAV BUTTONS — clean border fix */
.view-toggle{display:flex;}
.vtab{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:6px 10px;background:transparent;border:1px solid var(--bd);color:var(--mu);cursor:pointer;transition:background .15s,color .15s,border-color .15s;touch-action:manipulation;}
.vtab:first-child{border-radius:3px 0 0 3px;}
.vtab:last-child{border-radius:0 3px 3px 0;}
.vtab+.vtab{border-left:none;}
.vtab.active{background:rgba(255,107,0,.12);border-color:var(--or) !important;color:var(--or);border-left:1px solid var(--or) !important;position:relative;}
.vtab:hover:not(.active){color:var(--li);}
.week-tabs{display:flex;padding:0 20px;overflow-x:auto;scrollbar-width:none;}
.week-tabs::-webkit-scrollbar{display:none;}
.wtab{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:9px 14px;background:transparent;border:none;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .2s;touch-action:manipulation;flex-shrink:0;}
.wtab .wlbl{display:block;font-size:7px;margin-top:1px;letter-spacing:.08em;}
.wtab.w0.active{color:var(--gn);border-bottom-color:var(--gn);}
.wtab.w1.active{color:var(--am);border-bottom-color:var(--am);}
.wtab.w2.active{color:var(--or);border-bottom-color:var(--or);}
.wtab.w3.active{color:var(--bl);border-bottom-color:var(--bl);}
/* CYCLE BAR */
.cycle-bar{display:flex;align-items:center;justify-content:space-between;padding:5px 20px;background:rgba(255,255,255,.02);border-bottom:1px solid #1a1a1a;}
.cycle-info{font-family:'Space Mono',monospace;font-size:9px;color:#333;letter-spacing:.1em;text-transform:uppercase;}
.cycle-info strong{color:var(--or);}
.cycle-btn{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;background:transparent;border:1px solid #2a2a2a;color:var(--mu);border-radius:2px;cursor:pointer;touch-action:manipulation;transition:all .2s;}
.cycle-btn:hover{border-color:var(--or);color:var(--or);}
/* VIEWS */
.view{display:none;}
.view.active{display:block;}
/* HERO */
.sec-hero{padding:16px 20px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.sec-hero h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,5vw,30px);letter-spacing:.05em;line-height:1;}
.sec-hero p{font-family:'Space Mono',monospace;font-size:9px;color:var(--mu);letter-spacing:.08em;text-transform:uppercase;margin-top:3px;}
.wk-pill{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:.1em;padding:4px 10px;border:1px solid;border-radius:2px;white-space:nowrap;}
.wk-pill.c0{color:var(--gn);border-color:var(--gn);background:rgba(74,157,74,.08);}
.wk-pill.c1{color:var(--am);border-color:var(--am);background:rgba(255,179,0,.08);}
.wk-pill.c2{color:var(--or);border-color:var(--or);background:rgba(255,107,0,.08);}
.wk-pill.c3{color:var(--bl);border-color:var(--bl);background:rgba(107,143,207,.08);}
/* DAY TABS */
.day-nav{display:flex;background:var(--su);border-bottom:1px solid var(--bd);overflow-x:auto;scrollbar-width:none;}
.day-nav::-webkit-scrollbar{display:none;}
.dtab{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.07em;padding:11px 16px;background:transparent;border:none;color:#2a2a2a;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap;flex-shrink:0;touch-action:manipulation;}
.dtab small{display:block;font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.08em;text-transform:uppercase;color:inherit;opacity:.5;margin-top:1px;}
.dtab.active{color:var(--or);border-bottom-color:var(--or);}
/* EXERCISES */
.ex-wrap{padding:0 20px 40px;}
.ph-hdr{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--or);padding:14px 0 7px;border-bottom:1px solid var(--bd);}
.ex-card{border-bottom:1px solid #181818;padding:13px 0 10px;}
.ex-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.ex-left{flex:1;min-width:0;}
.ex-nm{font-weight:600;font-size:14px;color:var(--li);line-height:1.3;}
.ex-sb{font-size:11px;color:#555;margin-top:3px;line-height:1.4;}
.ex-meta{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-top:7px;}
.ex-tag{font-size:8px;font-family:'Space Mono',monospace;letter-spacing:.07em;text-transform:uppercase;padding:2px 6px;border-radius:2px;}
.tg-cal{background:rgba(107,143,207,.1);color:var(--bl);}
.tg-pot{background:rgba(255,107,0,.15);color:var(--or);}
.tg-fue{background:rgba(255,179,0,.1);color:var(--am);}
.tg-uni{background:rgba(74,157,74,.1);color:#7bc67e;}
.tg-est{background:rgba(140,180,220,.1);color:#9dc0e8;}
.tg-acc{background:rgba(200,200,200,.06);color:#666;}
.ex-sr{display:inline-flex;align-items:center;background:rgba(255,255,255,.04);border:1px solid #2a2a2a;border-radius:2px;padding:2px 7px;}
.ex-sr-main{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--li);letter-spacing:.03em;line-height:1.2;}
.ex-rest-tag{font-family:'Space Mono',monospace;font-size:8px;color:#444;letter-spacing:.06em;}
/* WEIGHT CHIP */
.wchip{border-radius:3px;padding:7px 9px;text-align:center;border:1px solid;min-width:85px;max-width:108px;flex-shrink:0;}
.wchip.ob{background:linear-gradient(135deg,rgba(255,107,0,.12),rgba(255,179,0,.06));border-color:rgba(255,107,0,.3);}
.wchip.mp{background:linear-gradient(135deg,rgba(107,143,207,.1),rgba(107,143,207,.04));border-color:rgba(107,143,207,.25);}
.wchip.manc{background:linear-gradient(135deg,rgba(74,157,74,.08),rgba(74,157,74,.03));border-color:rgba(74,157,74,.2);}
.wchip.polea,.wchip.bw{background:rgba(255,255,255,.025);border-color:rgba(255,255,255,.07);}
.w-kg{font-family:'Bebas Neue',sans-serif;font-size:19px;line-height:1;letter-spacing:.02em;}
.wchip.ob .w-kg{color:var(--or);}
.wchip.mp .w-kg{color:#8ab4f8;}
.wchip.manc .w-kg{color:#7bc67e;}
.wchip.polea .w-kg,.wchip.bw .w-kg{color:#888;}
.w-lbl{font-family:'Space Mono',monospace;font-size:7px;color:var(--mu);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;line-height:1.3;}
.w-plates{margin-top:4px;border-top:1px solid rgba(255,255,255,.05);padding-top:4px;}
.pviz{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;margin-bottom:2px;}
.pl{font-family:'Space Mono',monospace;font-size:6px;font-weight:700;padding:2px 3px;border-radius:1px;display:inline-block;line-height:1;}
.pl20{background:#FF6B00;color:#fff;}.pl10{background:#c8900a;color:#fff;}.pl5{background:#2d7a2d;color:#fff;}
.pl25{background:#3a6bb0;color:#fff;}.pl2{background:#6a4a9a;color:#fff;}.pl05{background:#555;color:#fff;}
.pviz-note{font-size:7px;color:#333;font-family:'Space Mono',monospace;text-align:center;margin-top:1px;}
/* LOG */
.log-wrap{background:rgba(255,255,255,.012);border:1px solid #1a1a1a;border-top:none;padding:10px 12px 12px;}
.log-hdr{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:#2e2e2e;margin-bottom:8px;}
.log-cols{display:grid;grid-template-columns:40px 1fr 70px 70px 32px;gap:4px;padding-bottom:5px;margin-bottom:4px;border-bottom:1px solid #1a1a1a;}
.log-cols span{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:#252525;text-align:center;}
.log-cols span:first-child{text-align:left;}
.log-sets{display:flex;flex-direction:column;gap:4px;}
.log-row{display:grid;grid-template-columns:40px 1fr 70px 70px 32px;gap:4px;align-items:center;}
.log-snum{font-family:'Space Mono',monospace;font-size:9px;color:var(--mu);}
.log-prog{font-family:'Space Mono',monospace;font-size:9px;color:#2a2a2a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.log-in{background:var(--cd);border:1px solid #1e1e1e;border-radius:2px;color:var(--li);font-family:'Space Mono',monospace;font-size:12px;padding:5px 4px;width:100%;text-align:center;-webkit-appearance:none;}
.log-in:focus{outline:none;border-color:rgba(255,107,0,.45);}
.log-in.ok{border-color:rgba(74,157,74,.35);background:rgba(74,157,74,.04);}
.log-chk{width:32px;height:32px;background:transparent;border:1px solid #1e1e1e;border-radius:2px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:transparent;touch-action:manipulation;transition:all .15s;}
.log-chk.on{background:rgba(74,157,74,.15);border-color:var(--gn);color:var(--gn);}
.log-notes-row{margin-top:8px;display:flex;gap:8px;align-items:center;}
.log-notes{flex:1;background:var(--cd);border:1px solid #1a1a1a;border-radius:2px;color:#666;font-family:'DM Sans',sans-serif;font-size:11px;padding:5px 8px;resize:none;height:30px;}
.log-notes::placeholder{color:#222;}
.log-notes:focus{outline:none;border-color:rgba(255,107,0,.25);color:var(--li);}
.log-lbl{font-family:'Space Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:.1em;color:#252525;white-space:nowrap;}
/* TIMER */
.timer-bar{position:fixed;left:0;right:0;bottom:66px;z-index:250;background:rgba(10,10,10,.98);border-top:2px solid var(--or);padding:10px 20px;display:none;align-items:center;gap:12px;backdrop-filter:blur(12px);}
.timer-bar.show{display:flex;}
.timer-bar.done{border-top-color:var(--gn);}
.timer-ring{width:44px;height:44px;flex-shrink:0;}
.timer-ring svg{transform:rotate(-90deg);}
.timer-ring circle{fill:none;stroke-width:4;transition:stroke-dashoffset .9s linear;}
.timer-info{flex:1;min-width:0;}
.timer-name{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.timer-countdown{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--or);letter-spacing:.04em;line-height:1;transition:color .3s;}
.timer-countdown.done{color:var(--gn);}
.timer-skip{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;background:transparent;border:1px solid #2a2a2a;color:var(--mu);border-radius:2px;cursor:pointer;touch-action:manipulation;white-space:nowrap;flex-shrink:0;}
/* MUSCLE VIEW */
.muscle-wrap{padding:0 20px 48px;}
.muscle-toggle{display:flex;margin-top:14px;}
.mtgl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:7px 14px;background:transparent;border:1px solid var(--bd);color:var(--mu);cursor:pointer;transition:background .15s,color .15s,border-color .15s;touch-action:manipulation;}
.mtgl:first-child{border-radius:3px 0 0 3px;}
.mtgl:last-child{border-radius:0 3px 3px 0;}
.mtgl+.mtgl{border-left:none;}
.mtgl.active{background:rgba(255,107,0,.12);border-color:var(--or) !important;color:var(--or);border-left:1px solid var(--or) !important;position:relative;}
.mtgl.no-data{opacity:.35;cursor:not-allowed;}
.body-diagram-wrap{position:relative;margin:16px auto;max-width:480px;border:1px solid var(--bd);}
.body-diagram-wrap img{width:100%;display:block;opacity:1;}
.body-overlay-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.muscle-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;padding:10px;background:var(--su);border:1px solid var(--bd);border-radius:2px;}
.leg-item{display:flex;align-items:center;gap:5px;}
.leg-dot{width:12px;height:12px;border-radius:2px;flex-shrink:0;}
.leg-txt{font-family:'Space Mono',monospace;font-size:8px;color:var(--mu);letter-spacing:.06em;text-transform:uppercase;}
.muscle-list-title{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--or);padding:12px 0 8px;border-bottom:1px solid var(--bd);}
.muscle-rows{display:flex;flex-direction:column;}
.muscle-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #181818;}
.muscle-row:last-child{border-bottom:none;}
.mrow-name{font-size:12px;color:var(--li);font-weight:500;min-width:140px;}
.mrow-bar-wrap{flex:1;height:5px;background:#181818;border-radius:3px;overflow:hidden;}
.mrow-bar{height:100%;border-radius:3px;}
.mrow-view{font-family:'Space Mono',monospace;font-size:7px;color:#333;letter-spacing:.06em;min-width:28px;text-align:right;text-transform:uppercase;}
.mrow-int{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.04em;min-width:30px;text-align:right;}
/* PROGRESS */
.prog-wrap{padding:0 20px 60px;}
.prog-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.06em;padding:18px 0 10px;border-bottom:1px solid var(--bd);}
.sub-tabs{display:flex;margin:14px 0 0;}
.stab{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:7px 16px;background:transparent;border:1px solid var(--bd);color:var(--mu);cursor:pointer;touch-action:manipulation;transition:background .15s,color .15s,border-color .15s;}
.stab:first-child{border-radius:3px 0 0 3px;}
.stab:last-child{border-radius:0 3px 3px 0;}
.stab+.stab{border-left:none;}
.stab.active{background:rgba(255,107,0,.12);border-color:var(--or) !important;color:var(--or);border-left:1px solid var(--or) !important;position:relative;}
.prog-note{font-size:11px;color:var(--mu);margin:12px 0 14px;line-height:1.6;}
.prog-note strong{color:#888;}
.prog-tbl-wrap{overflow-x:auto;margin-bottom:22px;-webkit-overflow-scrolling:touch;}
.prog-tbl{width:100%;border-collapse:collapse;min-width:540px;}
.prog-tbl th{font-family:'Space Mono',monospace;font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);padding:8px 10px;text-align:center;border-bottom:1px solid var(--bd);}
.prog-tbl th:first-child{text-align:left;min-width:120px;}
.prog-tbl td{padding:9px 10px;border-bottom:1px solid #161616;font-size:11px;vertical-align:middle;text-align:center;}
.prog-tbl td:first-child{text-align:left;color:var(--li);font-weight:500;}
.prog-tbl tr:hover td{background:rgba(255,107,0,.02);}
.c-prog{font-family:'Space Mono',monospace;font-size:8px;color:#2a2a2a;margin-bottom:2px;}
.c-real{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;}
.c-real.mt{color:#1e1e1e;}.c-real.sm{color:var(--am);}.c-real.up{color:var(--gn);}.c-real.dn{color:#8a4444;}
.summ-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px;}
@media(min-width:480px){.summ-grid{grid-template-columns:repeat(4,1fr);}}
.summ-card{background:var(--cd);border:1px solid var(--bd);padding:12px;position:relative;overflow:hidden;}
.summ-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.sc0::before{background:var(--gn);}.sc1::before{background:var(--am);}.sc2::before{background:var(--or);}.sc3::before{background:var(--bl);}
.summ-wname{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:4px;}
.summ-pct{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;}
.sc0 .summ-pct{color:var(--gn);}.sc1 .summ-pct{color:var(--am);}.sc2 .summ-pct{color:var(--or);}.sc3 .summ-pct{color:var(--bl);}
.summ-sub{font-size:10px;color:#444;margin-top:2px;}
.summ-bar{background:var(--bd);height:3px;border-radius:2px;margin-top:8px;overflow:hidden;}
.summ-fill{height:100%;border-radius:2px;}
.sc0 .summ-fill{background:var(--gn);}.sc1 .summ-fill{background:var(--am);}.sc2 .summ-fill{background:var(--or);}.sc3 .summ-fill{background:var(--bl);}
/* GRAPHS */
.graph-section{margin-bottom:32px;}
.graph-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.06em;color:var(--li);margin-bottom:8px;}
.graph-sub{font-family:'Space Mono',monospace;font-size:8px;color:var(--mu);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
.graph-svg-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.graph-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px;}
.g-leg-item{display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:8px;color:var(--mu);}
.g-leg-dot{width:20px;height:3px;border-radius:2px;}
.no-data-msg{font-family:'Space Mono',monospace;font-size:10px;color:#2a2a2a;letter-spacing:.08em;padding:20px;text-align:center;border:1px solid #1a1a1a;border-radius:2px;}
/* SAVE BAR */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,.97);border-top:1px solid var(--bd);padding:8px 20px calc(8px + env(safe-area-inset-bottom,0px));display:flex;align-items:center;gap:10px;backdrop-filter:blur(10px);z-index:300;}
.save-ind{font-family:'Space Mono',monospace;font-size:9px;color:#2a2a2a;letter-spacing:.07em;flex:1;transition:color .3s;}
.save-ind.saved{color:var(--gn);}.save-ind.dirty{color:var(--am);}
.sbtn{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:6px 11px;border-radius:2px;cursor:pointer;transition:all .2s;touch-action:manipulation;}
.sbtn-clr{background:transparent;border:1px solid #2a2a2a;color:var(--mu);}
.sbtn-exp{background:rgba(255,107,0,.07);border:1px solid rgba(255,107,0,.25);color:rgba(255,107,0,.6);}
.install-banner{display:none;background:rgba(255,107,0,.08);border-bottom:1px solid rgba(255,107,0,.2);padding:10px 20px;align-items:center;gap:12px;}
.install-banner.show{display:flex;}
.install-banner p{font-size:12px;color:#999;flex:1;line-height:1.4;}
.install-banner strong{color:var(--or);}
.ibtn{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;background:var(--or);border:none;color:#000;border-radius:2px;cursor:pointer;font-weight:700;white-space:nowrap;touch-action:manipulation;}
@media(min-width:680px){
  .nav-row1,.week-tabs,.cycle-bar,.ex-wrap,.prog-wrap,.muscle-wrap,.sec-hero,.save-bar,.install-banner,.day-nav{padding-left:36px;padding-right:36px;}
  .body-diagram-wrap{max-width:560px;}
}
</style>
</head>
<body>
<nav class="top-nav">
  <div class="nav-row1">
    <div class="logo">ELITE<span>HOOPS</span></div>
    <div class="view-toggle">
      <button class="vtab active" onclick="setView('programa',this)">Prog.</button>
      <button class="vtab" onclick="setView('registro',this)">Reg.</button>
      <button class="vtab" onclick="setView('musculos',this)">Musc.</button>
      <button class="vtab" onclick="setView('progreso',this)">Prog&#233;so</button>
    </div>
  </div>
  <div class="week-tabs">
    <button class="wtab w0 active" onclick="setWeek(0,this)">SEM 1<span class="wlbl">BASE</span></button>
    <button class="wtab w1" onclick="setWeek(1,this)">SEM 2<span class="wlbl">CARGA</span></button>

<script>
/* ========== PLATE CALCULATORS ========== */
const OB_DISCS   =[{sz:20,max:2,cls:'pl20'},{sz:10,max:1,cls:'pl10'},{sz:5,max:3,cls:'pl5'},{sz:2.5,max:1,cls:'pl25'}];
const MANC_DISCS =[{sz:10,max:2,cls:'pl10'},{sz:5,max:4,cls:'pl5'},{sz:2,max:4,cls:'pl2'},{sz:0.5,max:1,cls:'pl05'}];
const POLEA_DISCS=[{sz:20,max:4,cls:'pl20'},{sz:10,max:6,cls:'pl10'},{sz:5,max:10,cls:'pl5'},{sz:2.5,max:2,cls:'pl25'},{sz:2,max:8,cls:'pl2'},{sz:0.5,max:2,cls:'pl05'}];
const MANC_HANDLE=2;
function calcPlates(n,d){let r=Math.round(n*10)/10,res=[];for(const x of d){const c=Math.min(Math.floor(r/x.sz+0.001),x.max);if(c>0){res.push({...x,c});r=Math.round((r-c*x.sz)*10)/10;}}return Math.abs(r)<0.05?res:null;}
function plateHTML(p,l){if(!p)return'<div class="pviz-note" style="color:#5a3a3a">ver combinaci&#243;n manual</div>';const b=p.flatMap(x=>Array(x.c).fill('<span class="pl '+x.cls+'">'+x.sz+'</span>'));return'<div class="pviz">'+b.join('')+'</div><div class="pviz-note">'+l+'</div>';}
function wchip(ex,wd){
  const kg=wd.kg;
  if(typeof kg==='string')return'<div class="wchip bw"><div class="w-kg" style="font-size:14px">'+kg+'</div><div class="w-lbl">Peso Corporal</div></div>';
  const t=ex.barType;
  if(t==='ob'||t==='mp'){const bKg=t==='ob'?20:9,lbl=t==='ob'?'kg total &middot; OB':'kg total &middot; MP';const pl=(kg-bKg)/2;const pv=pl>0?plateHTML(calcPlates(pl,OB_DISCS),pl+'kg&times;2+'+bKg+'barra'):'<div class="pviz-note">Solo barra</div>';return'<div class="wchip '+t+'"><div class="w-kg">'+kg+'</div><div class="w-lbl">'+lbl+'</div><div class="w-plates">'+pv+'</div></div>';}
  if(t==='manc'){const pS=(kg-MANC_HANDLE)/2;const pv=pS>0?plateHTML(calcPlates(pS,MANC_DISCS),pS+'kg&times;2+'+MANC_HANDLE+'mango'):'<div class="pviz-note">Solo mango ~'+MANC_HANDLE+'kg</div>';return'<div class="wchip manc"><div class="w-kg">'+kg+'</div><div class="w-lbl">kg / mano</div><div class="w-plates">'+pv+'</div></div>';}
  if(t==='polea')return'<div class="wchip polea"><div class="w-kg">'+kg+'</div><div class="w-lbl">kg &middot; polea</div><div class="w-plates">'+plateHTML(calcPlates(kg,POLEA_DISCS),kg+'kg stack')+'</div></div>';
  if(t==='ball')return'<div class="wchip bw"><div class="w-kg">'+kg+'</div><div class="w-lbl">kg &middot; bal&#243;n</div></div>';
  return'<div class="wchip bw"><div class="w-kg">'+kg+'</div><div class="w-lbl">kg</div></div>';
}

/* ========== TIMER ========== */
let timerInterval=null,timerTotal=0,timerRemaining=0;
const CIRCUMFERENCE=2*Math.PI*18;
function parseRest(s){if(!s||s==='Superset'||s==='Sin descanso'||s==='—')return 0;const m=s.match(/(\d+(?:\.\d+)?)\s*min/);if(m)return Math.round(parseFloat(m[1])*60);const sg=s.match(/(\d+)\s*seg/);if(sg)return parseInt(sg[1]);return 0;}
function playBeep(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const freqs=[880,880,1100];freqs.forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='sine';const t=ctx.currentTime+i*0.25;g.gain.setValueAtTime(0.25,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.18);o.start(t);o.stop(t+0.18);});}catch(e){}}
function vibrateDevice(){try{if('vibrate'in navigator)navigator.vibrate([250,100,250,100,400]);}catch(e){}}
function startTimer(exName,restSecs){
  if(restSecs<=0)return;
  stopTimer();
  timerTotal=restSecs;timerRemaining=restSecs;
  const bar=document.getElementById('timer-bar');
  const name=document.getElementById('timer-name');
  const cd=document.getElementById('timer-countdown');
  const arc=document.getElementById('timer-arc');
  bar.className='timer-bar show';
  name.textContent=exName+' \u2014 Descanso';
  cd.className='timer-countdown';
  arc.style.stroke='#FF6B00';
  updateTimerDisplay();
  timerInterval=setInterval(()=>{
    timerRemaining--;
    if(timerRemaining<=0){
      timerRemaining=0;updateTimerDisplay();
      clearInterval(timerInterval);timerInterval=null;
      cd.textContent='Listo!';cd.className='timer-countdown done';
      bar.className='timer-bar show done';
      arc.style.stroke='#4a9d4a';
      playBeep();vibrateDevice();
      setTimeout(()=>{bar.className='timer-bar';},3500);
    } else {updateTimerDisplay();}
  },1000);
}
function updateTimerDisplay(){
  const cd=document.getElementById('timer-countdown');
  const arc=document.getElementById('timer-arc');
  const m=Math.floor(timerRemaining/60),s=timerRemaining%60;
  cd.textContent=m+':'+(s<10?'0':'')+s;
  const pct=timerRemaining/timerTotal;
  const offset=CIRCUMFERENCE*(1-pct);
  arc.style.strokeDasharray=CIRCUMFERENCE;
  arc.style.strokeDashoffset=offset;
  if(timerRemaining<=10){arc.style.stroke='#ff3232';cd.style.color='#ff3232';}
  else if(timerRemaining<=30){arc.style.stroke='var(--am)';cd.style.color='var(--am)';}
  else{arc.style.stroke='#FF6B00';cd.style.color='var(--or)';}
}
function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}document.getElementById('timer-bar').className='timer-bar';}

function getEx(id){for(const d of DAYS)for(const p of d.phases)for(const e of p.exs)if(e.id===id)return e;return null;}

/* ========== DATA KEY HELPERS (with cycle support + backward compat) ========== */
function dkey(exId,cycle,week,s,type){return exId+'_c'+cycle+'_w'+week+'_s'+s+'_'+type;}
function dkeyOld(exId,week,s,type){return exId+'_w'+week+'_s'+s+'_'+type;}
function getVal(exId,cycle,week,s,type){
  const nk=dkey(exId,cycle,week,s,type);
  if(logData[nk]!==undefined)return logData[nk];
  if(cycle===1){const ok=dkeyOld(exId,week,s,type);if(logData[ok]!==undefined)return logData[ok];}
  return type==='ck'?false:'';
}
function setVal(exId,cycle,week,s,type,val){logData[dkey(exId,cycle,week,s,type)]=val;}

/* ========== CYCLE ========== */
function newCycle(){
  if(!confirm('Empezar Ciclo '+(curCycle+1)+'? Los datos del ciclo actual quedan guardados para las gr\u00e1ficas.'))return;
  curCycle++;
  localStorage.setItem('eh_cycle',String(curCycle));
  document.getElementById('cycle-info').innerHTML='Ciclo <strong>'+curCycle+'</strong>';
  curWeek=0;
  document.querySelectorAll('.wtab').forEach((el,i)=>el.classList.toggle('active',i===0));
  renderCurrent();
}

/* ========== MUSCLE CALC ========== */
function calcSessionMuscles(dayIdx,weekIdx){
  const day=DAYS[dayIdx],prog={},real={};let hasReal=false;
  for(const ph of day.phases)for(const ex of ph.exs){
    const muscles=EX_MUSCLES[ex.id];if(!muscles)continue;
    const wd=ex.wks[weekIdx],progKg=typeof wd.kg==='number'?wd.kg:null;
    let factor=null;
    if(progKg!==null){let sum=0,cnt=0;
      for(let s=0;s<wd.s;s++){const kv=getVal(ex.id,curCycle,weekIdx,s,'kg');if(kv&&!isNaN(parseFloat(kv))){sum+=parseFloat(kv)/progKg;cnt++;}}
      if(cnt>0){factor=sum/cnt;hasReal=true;}
    }
    for(const[m,lvl]of Object.entries(muscles)){
      if(!prog[m]||prog[m]<lvl)prog[m]=lvl;
      if(factor!==null){const ri=factor>=1.06?Math.min(4,lvl+1):factor>=0.88?lvl:factor>=0.70?Math.max(1,lvl-1):1;if(!real[m]||real[m]<ri)real[m]=ri;}
    }
  }
  return{prog,real,hasReal};
}

/* ========== GRAPH DATA ========== */
const CYCLE_COLORS=['#FF6B00','#FFB300','#4a9d4a','#6b8fcf','#9b59b6','#e74c3c'];
function getExHistory(exId){
  const ex=getEx(exId);if(!ex)return[];
  const pts=[];
  for(let c=1;c<=curCycle;c++){
    for(let w=0;w<4;w++){
      const wd=ex.wks[w];let maxKg=null;
      for(let s=0;s<wd.s;s++){const kv=getVal(exId,c,w,s,'kg');if(kv&&!isNaN(parseFloat(kv))){const f=parseFloat(kv);if(maxKg===null||f>maxKg)maxKg=f;}}
      pts.push({label:'C'+c+'S'+(w+1),cycle:c,week:w,kg:maxKg,prog:typeof wd.kg==='number'?wd.kg:null});
    }
  }
  return pts;
}
function drawGraph(exId){
  const pts=getExHistory(exId);
  const hasData=pts.some(p=>p.kg!==null);
  if(!hasData)return'<div class="no-data-msg">Sin datos registrados a\u00fan</div>';
  const W=380,H=160,PL=46,PR=10,PT=12,PB=28;
  const cW=W-PL-PR,cH=H-PT-PB;
  const allVals=[...pts.filter(p=>p.kg!==null).map(p=>p.kg),...pts.filter(p=>p.prog!==null).map(p=>p.prog)];
  if(!allVals.length)return'<div class="no-data-msg">Sin datos</div>';
  const minV=Math.min(...allVals)*0.92,maxV=Math.max(...allVals)*1.04;
  const xS=(i)=>PL+(i/(pts.length-1||1))*cW;
  const yS=(v)=>PT+cH-((v-minV)/(maxV-minV||1))*cH;
  let svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;">';
  // Grid lines
  for(let i=0;i<=4;i++){const y=PT+i*(cH/4);svg+='<line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="#1a1a1a" stroke-width="1"/>';}
  // Y labels
  for(let i=0;i<=4;i++){const v=Math.round(minV+(4-i)*(maxV-minV)/4);const y=PT+i*(cH/4);svg+='<text x="'+(PL-4)+'" y="'+(y+3)+'" text-anchor="end" font-family="Space Mono,monospace" font-size="8" fill="#333">'+v+'</text>';}
  // Programmed dashed line
  const hasProg=pts.some(p=>p.prog!==null);
  if(hasProg){let pd='';pts.forEach((p,i)=>{if(p.prog===null)return;const x=xS(i),y=yS(p.prog);pd+=(pd?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);});svg+='<path d="'+pd+'" fill="none" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="4 3"/>';}
  // Actual lines by cycle
  for(let c=1;c<=curCycle;c++){
    const cyPts=pts.filter(p=>p.cycle===c);const col=CYCLE_COLORS[(c-1)%CYCLE_COLORS.length];
    let ld='';cyPts.forEach((p,ci)=>{if(p.kg===null)return;const gi=pts.indexOf(p);const x=xS(gi),y=yS(p.kg);ld+=(ld?'L':'M')+x.toFixed(1)+' '+y.toFixed(1);});
    if(ld)svg+='<path d="'+ld+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linejoin="round"/>';
    cyPts.forEach(p=>{if(p.kg===null)return;const gi=pts.indexOf(p);svg+='<circle cx="'+xS(gi).toFixed(1)+'" cy="'+yS(p.kg).toFixed(1)+'" r="3" fill="'+col+'"/>';});
  }
  // X labels
  pts.forEach((p,i)=>{if(i%4===0||i===pts.length-1){svg+='<text x="'+xS(i).toFixed(1)+'" y="'+(H-4)+'" text-anchor="middle" font-family="Space Mono,monospace" font-size="7" fill="#444">'+p.label+'</text>';}});
  svg+='</svg>';
  // Legend
  let leg='<div class="graph-legend">';
  if(hasProg)leg+='<div class="g-leg-item"><div class="g-leg-dot" style="background:#2a2a2a;border:1px dashed #444"></div>Programado</div>';
  for(let c=1;c<=curCycle;c++)leg+='<div class="g-leg-item"><div class="g-leg-dot" style="background:'+CYCLE_COLORS[(c-1)%CYCLE_COLORS.length]+'"></div>Ciclo '+c+'</div>';
  leg+='</div>';
  return svg+leg;
}

/* ========== RENDER PROGRESO ========== */
function renderProgreso(){
  const wk=WEEKS[curWeek];
  let h='<div class="prog-wrap"><div class="prog-title">\ud83d\udcca PROGRESO REAL</div>';
  h+='<div class="sub-tabs"><button class="stab'+(progresoTab==='tabla'?' active':'')+'" onclick="setProgresoTab(\'tabla\')">Tabla</button><button class="stab'+(progresoTab==='graficas'?' active':'')+'" onclick="setProgresoTab(\'graficas\')">Gr\u00e1ficas</button></div>';
  if(progresoTab==='tabla'){
    h+='<p class="prog-note">Programado vs. registrado &middot; <strong>Verde</strong> = superaste &middot; <strong>Naranja</strong> = igual &middot; <strong>Rojo</strong> = por debajo.</p>';
    h+='<div class="prog-tbl-wrap"><table class="prog-tbl"><thead><tr><th>Ejercicio</th>';
    for(const w of WEEKS)h+='<th>'+w.name+'<br><span style="font-size:6px;color:var(--'+w.color+')">'+w.label+'</span></th>';
    h+='</tr></thead><tbody>';
    for(const t of TRACK){const ex=getEx(t.exId);if(!ex)continue;h+='<tr><td>'+t.name+'</td>';
      for(let wi=0;wi<4;wi++){const wd=ex.wks[wi];const prog=typeof wd.kg==='string'?wd.kg:wd.kg+'kg';let maxReal=null,maxReps=null;
        for(let s=0;s<wd.s;s++){const kv=getVal(ex.id,curCycle,wi,s,'kg');if(kv&&!isNaN(parseFloat(kv))){const f=parseFloat(kv);if(maxReal===null||f>maxReal){maxReal=f;maxReps=getVal(ex.id,curCycle,wi,s,'rp');}}}
        let cls='mt',txt='\u2014';if(maxReal!==null){const p=typeof wd.kg==='number'?wd.kg:null;cls=p===null?'sm':maxReal>p?'up':maxReal===p?'sm':'dn';txt=maxReps?maxReal+'\u00d7'+maxReps:maxReal+'kg';}
        h+='<td><div class="c-prog">'+wd.s+'\u00d7'+wd.r+'\u00b7'+prog+'</div><div class="c-real '+cls+'">'+txt+'</div></td>';
      }
      h+='</tr>';
    }
    h+='</tbody></table></div>';
    h+='<div class="prog-title" style="font-size:18px;padding-top:14px">SERIES COMPLETADAS \u2014 Ciclo '+curCycle+'</div><div class="summ-grid">';
    for(const w of WEEKS){let total=0,done=0;for(const d of DAYS)for(const ph of d.phases)for(const e of ph.exs){const wd=e.wks[w.id];for(let s=0;s<wd.s;s++){total++;if(getVal(e.id,curCycle,w.id,s,'ck'))done++;}}const pct=total>0?Math.round(done/total*100):0;h+='<div class="summ-card sc'+w.id+'"><div class="summ-wname">'+w.name+'</div><div class="summ-pct">'+pct+'%</div><div class="summ-sub">'+done+'/'+total+' series</div><div class="summ-bar"><div class="summ-fill" style="width:'+pct+'%"></div></div></div>';}
    h+='</div>';
  } else {
    // Graphs
    h+='<p class="prog-note">Evoluci\u00f3n real vs. programado. Las gr\u00e1ficas muestran <strong>todos los ciclos</strong> que hayas completado. Actualmente: <strong>Ciclo '+curCycle+'</strong>.</p>';
    for(const t of TRACK){h+='<div class="graph-section"><div class="graph-title">'+t.name+'</div>'+drawGraph(t.exId)+'</div>';}
  }
  h+='</div>';
  document.getElementById('v-progreso').innerHTML=h;
}

/* ========== NAVIGATION ========== */
function setView(v,btn){curView=v;document.querySelectorAll('.vtab').forEach(el=>el.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));document.getElementById('v-'+v).classList.add('active');renderCurrent();}
function setWeek(w,btn){curWeek=w;document.querySelectorAll('.wtab').forEach(el=>el.classList.remove('active'));btn.classList.add('active');renderCurrent();}
function setDay(d){curDay=d;renderCurrent();}
function setMuscleMode(m){muscleMode=m;renderMusculos();}
function setProgresoTab(t){progresoTab=t;renderProgreso();}
function renderCurrent(){
  if(curView==='programa')renderPrograma();
  else if(curView==='registro')renderRegistro();
  else if(curView==='musculos')renderMusculos();
  else renderProgreso();
}

/* ========== LOG ========== */
function onLog(el){
  const exId=el.dataset.exid,week=parseInt(el.dataset.week),s=parseInt(el.dataset.set),type=el.dataset.type;
  setVal(exId,curCycle,week,s,type,el.value);
  el.classList.toggle('ok',el.value!=='');
  scheduleSave();
}
function toggleChk(btn){
  const on=!btn.classList.contains('on');
  btn.classList.toggle('on',on);
  const exId=btn.dataset.exid,week=parseInt(btn.dataset.week),s=parseInt(btn.dataset.set);
  setVal(exId,curCycle,week,s,'ck',on);
  if(on){const secs=parseInt(btn.dataset.rest)||0;if(secs>0)startTimer(btn.dataset.exname,secs);}
  scheduleSave();
}

/* ========== STORAGE ========== */
const STORE_KEY='elitehoops_v6';
function scheduleSave(){
  const ind=document.getElementById('save-ind');ind.textContent='\u25cf Guardando\u2026';ind.className='save-ind dirty';clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{try{localStorage.setItem(STORE_KEY,JSON.stringify(logData));ind.textContent='\u2713 Guardado';ind.className='save-ind saved';setTimeout(()=>{ind.textContent='\u2014 Datos guardados en este dispositivo';ind.className='save-ind';},2500);}catch(e){ind.textContent='\u26a0 Error al guardar';}},700);
}
function loadData(){
  try{const r=localStorage.getItem(STORE_KEY);if(r)logData=JSON.parse(r);}catch(e){logData={};}
  // Migrate old keys (v4/v5) to cycle-1 format
  try{for(const k of Object.keys(logData)){if(!k.includes('_c'))continue;}
  const old5=localStorage.getItem('elitehoops_v5');if(old5){const od=JSON.parse(old5);for(const[k,v]of Object.entries(od)){if(!logData[k])logData[k]=v;}}}catch(e){}
  curCycle=parseInt(localStorage.getItem('eh_cycle')||'1');
  document.getElementById('cycle-info').innerHTML='Ciclo <strong>'+curCycle+'</strong>';
}
function clearData(){if(!confirm('\u00bfBorrar todos los registros?'))return;logData={};try{localStorage.removeItem(STORE_KEY);}catch(e){}document.getElementById('save-ind').textContent='Datos borrados';renderCurrent();}
function exportData(){const blob=new Blob([JSON.stringify({exportDate:new Date().toISOString(),cycle:curCycle,data:logData},null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='elitehoops_c'+curCycle+'_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url);}

/* ========== PWA ========== */
const ICON_SVG="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%230A0A0A'/%3E%3Ccircle cx='256' cy='236' r='170' fill='%23FF6B00' opacity='.18'/%3E%3Ccircle cx='256' cy='236' r='170' fill='none' stroke='%23FF6B00' stroke-width='18'/%3E%3Cline x1='86' y1='236' x2='426' y2='236' stroke='%23FF6B00' stroke-width='18'/%3E%3Cline x1='256' y1='66' x2='256' y2='406' stroke='%23FF6B00' stroke-width='18'/%3E%3C/svg%3E";
function setupPWA(){try{const m={name:'Elite Hoops',short_name:'Elite Hoops',start_url:window.location.href,scope:window.location.href,display:'standalone',orientation:'portrait-primary',background_color:'#0A0A0A',theme_color:'#FF6B00',icons:[{src:ICON_SVG,sizes:'192x192',type:'image/svg+xml',purpose:'any maskable'},{src:ICON_SVG,sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'}]};const blob=new Blob([JSON.stringify(m)],{type:'application/json'});document.getElementById('manifest-link').href=URL.createObjectURL(blob);}catch(e){}
  window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-banner').classList.add('show');});
  document.getElementById('install-btn').addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById('install-banner').classList.remove('show');});
  window.addEventListener('appinstalled',()=>{document.getElementById('install-banner').classList.remove('show');});
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone;
  if(isIOS&&!localStorage.getItem('eh_ios')){setTimeout(()=>{const b=document.getElementById('install-banner');b.querySelector('p').innerHTML='\ud83d\udcf1 <strong>iPhone/iPad:</strong> Compartir \u2192 <strong>A\u00f1adir a pantalla de inicio</strong>';b.querySelector('#install-btn').style.display='none';b.classList.add('show');localStorage.setItem('eh_ios','1');},1500);}
}
/* ========== INIT ========== */
loadData();setupPWA();renderPrograma();
</script>
</body>
</html>
